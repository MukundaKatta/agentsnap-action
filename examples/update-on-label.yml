name: Update snapshots
on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    if: github.event.label.name == 'snapshot-update'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm test
      - uses: MukundaKatta/agentsnap-action@v1
        with:
          update-snapshots: true
      - name: Commit refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/__agentsnap__
          git commit -m "Refresh agentsnap baselines" || echo "nothing to commit"
          git push
